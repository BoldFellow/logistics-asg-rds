AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Flask-Admin Logistics Demo -- ALB -> ASG (EC2, ARM64) -> RDS PostgreSQL.
  NAT Gateway (public subnet A) provides PyPI egress so pip install runs at boot.
  Five VPC endpoints retained alongside it: S3 Gateway (free, AL2023 dnf repos),
  Secrets Manager, SSM/SSMMessages/EC2Messages (Session Manager). Subnets imported
  from VpcStackName/VpcName exports. No-NAT locked-down variant in Appendix B of
  aws-asg-rds-flask-guide.md. Post-deploy: load schema via SSM Run Command (guide s6).

# ============================================================================
# PARAMETERS
# ============================================================================
Parameters:

  VpcStackName:
    Type: String
    Description: >
      Name of the VPC CloudFormation stack to import subnet and VPC IDs from.

  VpcName:
    Type: String
    Default: VPC1
    Description: >
      VPC name within the VPC stack (must match Vpc1Name or Vpc2Name). Used to
      construct the Fn::ImportValue keys for subnets and VPC ID.

  BastionSecurityGroupId:
    Type: String
    Default: ""
    Description: >
      Optional. SG of an existing bastion host. If provided, grants ingress to
      RDS:5432 from that SG. Leave empty to skip (schema bootstrap uses SSM Run
      Command instead).

  ArtifactBucket:
    Type: String
    Description: Name of the S3 bucket containing the zipped Flask app.

  ArtifactKey:
    Type: String
    Default: flask-admin-app/app.zip
    Description: >
      S3 key of the zipped app (must contain app.py and requirements.txt at the
      zip root).

  AllowedAlbCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      CIDR allowed to reach the ALB on port 80. Lock this down to your
      office/student IPs for the demo -- Flask-Admin has no built-in auth.
    AllowedPattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$

  AppInstanceType:
    Type: String
    Default: t4g.small
    Description: EC2 instance type for ASG members (ARM64 -- must match the AL2023 arm64 AMI).
    AllowedValues:
      - t4g.micro
      - t4g.small
      - t4g.medium
      - t4g.large
      - m6g.large
      - m6g.xlarge
      - c6g.large
      - c6g.xlarge

  DbInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS instance class (Graviton-based for cost efficiency in demos).
    AllowedValues:
      - db.t4g.micro
      - db.t4g.small
      - db.t4g.medium
      - db.t4g.large

  DbAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    Description: RDS allocated storage in GiB (gp3).

  AsgMinSize:
    Type: Number
    Default: 2
    Description: Minimum number of instances in the Auto Scaling Group.

  AsgMaxSize:
    Type: Number
    Default: 4
    Description: Maximum number of instances in the Auto Scaling Group.

  AsgDesiredCapacity:
    Type: Number
    Default: 2
    Description: Desired number of instances in the Auto Scaling Group.

  SecretName:
    Type: String
    Default: rds/flask-demo
    Description: Secrets Manager secret name that holds the RDS credentials.

  CreateS3GatewayEndpoint:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      Set to false when another instance of this stack is already deployed in the
      same VPC -- the S3 prefix-list route can only be added once per route table.
      The existing endpoint's route still serves all instances in the route table.

  CreateInterfaceEndpoints:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      Set to false when another instance of this stack is already deployed in the
      same VPC -- PrivateDnsEnabled cannot be duplicated per service per VPC.
      Secrets Manager and SSM will route through the NAT Gateway instead.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Cross-stack imports" }
        Parameters: [VpcStackName, VpcName]
      - Label: { default: "Networking" }
        Parameters: [BastionSecurityGroupId, AllowedAlbCidr, CreateS3GatewayEndpoint, CreateInterfaceEndpoints]
      - Label: { default: "Application artifact" }
        Parameters: [ArtifactBucket, ArtifactKey]
      - Label: { default: "Compute" }
        Parameters: [AppInstanceType, AsgMinSize, AsgMaxSize, AsgDesiredCapacity]
      - Label: { default: "Database" }
        Parameters: [DbInstanceClass, DbAllocatedStorage, SecretName]

# ============================================================================
# CONDITIONS
# ============================================================================
Conditions:
  ShouldCreateS3Endpoint: !Equals [!Ref CreateS3GatewayEndpoint, "true"]
  ShouldCreateInterfaceEndpoints: !Equals [!Ref CreateInterfaceEndpoints, "true"]
  HasBastionSG: !Not [!Equals [!Ref BastionSecurityGroupId, ""]]

# ============================================================================
# RESOURCES
# ============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # Secrets Manager: pre-create the secret with username/engine/dbname/port and
  # a generated password. DBSecretAttachment (below) patches in the host/port
  # after RDS is created, completing the JSON that app.py expects:
  #   {username, password, engine, host, port, dbname}
  # ---------------------------------------------------------------------------
  DBSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Ref SecretName
      Description: RDS PostgreSQL credentials for the Flask-Admin logistics demo.
      GenerateSecretString:
        SecretStringTemplate: '{"username":"appadmin","engine":"postgres","dbname":"logistics","port":5432}'
        GenerateStringKey: password
        PasswordLength: 24
        ExcludePunctuation: true
        RequireEachIncludedType: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-secret"
        - Key: ManagedByCloudFormation
          Value: "true"

  # ---------------------------------------------------------------------------
  # Security groups
  # ---------------------------------------------------------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ingress to the Flask-Admin ALB
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedAlbCidr
          Description: HTTP from allowed CIDR
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb-sg"
        - Key: ManagedByCloudFormation
          Value: "true"

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Flask app EC2 instances -- only the ALB can reach port 80
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-app-sg"
        - Key: ManagedByCloudFormation
          Value: "true"

  AppFromAlbIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AppSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: HTTP from ALB

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL access for the Flask-Admin demo RDS instance
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-rds-sg"
        - Key: ManagedByCloudFormation
          Value: "true"

  RdsFromAppIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref AppSecurityGroup
      Description: Postgres from app tier

  RdsFromBastionIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasBastionSG
    Properties:
      GroupId: !Ref RdsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref BastionSecurityGroupId
      Description: Postgres from bastion for schema bootstrap

  # ---------------------------------------------------------------------------
  # VPC Endpoints -- retained alongside the NAT Gateway so that AWS API calls
  # (Secrets Manager, SSM) and AL2023 repo traffic (S3) stay inside the AWS
  # network. The SSM endpoints ensure Session Manager works even if the NAT
  # Gateway is degraded or replaced by a no-egress locked-down variant.
  #   * S3 Gateway Endpoint        (free) -- AL2023 dnf repos + aws s3 cp artifact
  #   * Secrets Manager endpoint         -- boto3 GetSecretValue at app boot
  #   * SSM / SSMMessages / EC2Messages  -- SSM Session Manager + Run Command
  # ---------------------------------------------------------------------------
  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ShouldCreateInterfaceEndpoints
    Properties:
      GroupDescription: Allow HTTPS from app instances to VPC interface endpoints
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref AppSecurityGroup
          Description: HTTPS from app tier to VPC endpoints
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-endpoint-sg"
        - Key: ManagedByCloudFormation
          Value: "true"

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: ShouldCreateS3Endpoint
    Properties:
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateRouteTableId"

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: ShouldCreateInterfaceEndpoints
    Properties:
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      SubnetIds:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetAId"
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetBId"
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  SsmEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: ShouldCreateInterfaceEndpoints
    Properties:
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ssm"
      VpcEndpointType: Interface
      SubnetIds:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetAId"
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetBId"
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  SsmMessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: ShouldCreateInterfaceEndpoints
    Properties:
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ssmmessages"
      VpcEndpointType: Interface
      SubnetIds:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetAId"
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetBId"
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  Ec2MessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: ShouldCreateInterfaceEndpoints
    Properties:
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ec2messages"
      VpcEndpointType: Interface
      SubnetIds:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetAId"
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetBId"
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  # ---------------------------------------------------------------------------
  # NAT Gateway -- single-AZ (public subnet A), demo-grade (~$33/mo).
  # Provides general internet egress: pip install from PyPI, dnf-extras, etc.
  # PrivateDefaultRoute wires it into the private route table imported from the
  # VPC stack. AppAutoScalingGroup DependsOn PrivateDefaultRoute so no instance
  # boots before egress is live.
  # ---------------------------------------------------------------------------
  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-eip"
        - Key: ManagedByCloudFormation
          Value: "true"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PublicSubnetAId"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-gw"
        - Key: ManagedByCloudFormation
          Value: "true"

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateRouteTableId"
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # ---------------------------------------------------------------------------
  # RDS -- shares private subnets with the ASG; isolated by security group.
  # No dedicated DB-tier subnets exist in the 2-tier VPC stack; SG isolation
  # is the security boundary for this demo.
  # ---------------------------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "${AWS::StackName}-db-subnet-group"
      DBSubnetGroupDescription: "Dedicated DB subnets."
      SubnetIds:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-DbSubnetAId"
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-DbSubnetBId"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-subnet-group"
        - Key: ManagedByCloudFormation
          Value: "true"

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub "${AWS::StackName}-pg"
      Engine: postgres
      # No EngineVersion -> RDS picks the current default. Pin (e.g. '16.6') for production.
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      DBName: logistics
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}::username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}::password}}'
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 1
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-pg"
        - Key: ManagedByCloudFormation
          Value: "true"

  # Patches host/port/dbInstanceIdentifier into the secret AFTER RDS exists.
  # This completes the JSON so app.py's boto3 call returns a usable connection string.
  DBSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref DBInstance
      TargetType: AWS::RDS::DBInstance

  # ---------------------------------------------------------------------------
  # IAM -- EC2 instances read the DB secret and pull the app artifact from S3
  # ---------------------------------------------------------------------------
  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-app-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: read-secret-and-artifact
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref DBSecret
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}*"
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${ArtifactBucket}/${ArtifactKey}"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-app-role"
        - Key: ManagedByCloudFormation
          Value: "true"

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-app-profile"
      Roles:
        - !Ref AppInstanceRole

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PublicSubnetAId"
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PublicSubnetBId"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb"
        - Key: ManagedByCloudFormation
          Value: "true"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-tg"
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-VpcId"
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 15
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: '200' }
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-tg"
        - Key: ManagedByCloudFormation
          Value: "true"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---------------------------------------------------------------------------
  # Launch Template + Auto Scaling Group
  #
  # AMI is resolved at deploy time via SSM dynamic ref (always the latest
  # AL2023 arm64 AMI -- no parameter needed).
  #
  # UserData substitutes ${AWS::Region}, ${ArtifactBucket}, ${ArtifactKey},
  # and ${SecretName} via Fn::Sub. Bash variables that must survive into the
  # rendered script are escaped as ${!var} so Fn::Sub leaves them intact.
  # ---------------------------------------------------------------------------
  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${AWS::StackName}-lt"
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: Name
              Value: !Sub "${AWS::StackName}-lt"
            - Key: ManagedByCloudFormation
              Value: "true"
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
        InstanceType: !Ref AppInstanceType
        IamInstanceProfile:
          Name: !Ref AppInstanceProfile
        SecurityGroupIds:
          - !Ref AppSecurityGroup
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${AWS::StackName}-instance"
              - Key: ManagedByCloudFormation
                Value: "true"
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail
            exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

            REGION="${AWS::Region}"
            S3_BUCKET="${ArtifactBucket}"
            APP_KEY="${ArtifactKey}"
            SECRET_NAME="${SecretName}"
            APP_DIR="/opt/app"

            # ---- 1. base packages ----
            dnf update -y
            dnf install -y \
              python3.11 python3.11-pip \
              nginx unzip awscli-2 \
              postgresql15

            # ---- 2. fetch app bundle ----
            mkdir -p "${!APP_DIR}"
            aws s3 cp "s3://${!S3_BUCKET}/${!APP_KEY}" /tmp/app.zip --region "${!REGION}"
            unzip -o /tmp/app.zip -d "${!APP_DIR}"
            rm -f /tmp/app.zip

            # ---- 3. virtualenv + deps (online -- NAT Gateway provides PyPI access) ----
            python3.11 -m venv "${!APP_DIR}/venv"
            "${!APP_DIR}/venv/bin/pip" install --upgrade pip
            "${!APP_DIR}/venv/bin/pip" install -r "${!APP_DIR}/requirements.txt"
            chown -R ec2-user:ec2-user "${!APP_DIR}"

            # ---- 4. systemd unit for gunicorn ----
            FLASK_KEY="$(openssl rand -hex 32)"
            cat >/etc/systemd/system/flask-admin.service <<EOF
            [Unit]
            Description=Flask-Admin Logistics RDS Demo
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            User=ec2-user
            Group=ec2-user
            WorkingDirectory=${!APP_DIR}
            Environment="DB_SECRET_NAME=${!SECRET_NAME}"
            Environment="AWS_REGION=${!REGION}"
            Environment="FLASK_SECRET_KEY=${!FLASK_KEY}"
            ExecStart=${!APP_DIR}/venv/bin/gunicorn \\
              --workers 2 --bind 127.0.0.1:8000 \\
              --access-logfile - --error-logfile - \\
              app:app
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            # ---- 5. nginx reverse proxy ----
            rm -f /etc/nginx/conf.d/default.conf

            cat >/etc/nginx/conf.d/flask.conf <<'NGINX_EOF'
            server {
                listen 80 default_server;
                server_name _;

                location = /health {
                    access_log off;
                    proxy_pass http://127.0.0.1:8000/health;
                }

                location / {
                    proxy_pass         http://127.0.0.1:8000;
                    proxy_set_header   Host              $host;
                    proxy_set_header   X-Real-IP         $remote_addr;
                    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_read_timeout 60s;
                }
            }
            NGINX_EOF

            # ---- 6. start everything ----
            systemctl daemon-reload
            systemctl enable --now flask-admin
            systemctl enable --now nginx

            echo "user-data finished OK"

  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    # Wait for the secret to have host info and for the listener to exist before
    # any instance boots -- prevents a race between instance startup and
    # DBSecretAttachment completing.
    DependsOn: [DBSecretAttachment, HttpListener, PrivateDefaultRoute]
    Properties:
      AutoScalingGroupName: !Sub "${AWS::StackName}-asg"
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetAId"
        - Fn::ImportValue: !Sub "${VpcStackName}-${VpcName}-PrivateSubnetBId"
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      MinSize: !Ref AsgMinSize
      MaxSize: !Ref AsgMaxSize
      DesiredCapacity: !Ref AsgDesiredCapacity
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 600
      MetricsCollection:
        - Granularity: "1Minute"
          Metrics:
            - "GroupMinSize"
            - "GroupMaxSize"
            - "GroupDesiredCapacity"
            - "GroupInServiceInstances"
            - "GroupPendingInstances"
            - "GroupStandbyInstances"
            - "GroupTerminatingInstances"
            - "GroupTotalInstances"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-asg"
          PropagateAtLaunch: true
        - Key: ManagedByCloudFormation
          Value: "true"
          PropagateAtLaunch: true

  # ---------------------------------------------------------------------------
  # Scaling policies and CloudWatch alarms (values mirrored from CF/ASG.yaml)
  # ---------------------------------------------------------------------------
  ScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AppAutoScalingGroup
      Cooldown: 60
      ScalingAdjustment: 2

  ScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AppAutoScalingGroup
      Cooldown: 120
      ScalingAdjustment: -2

  ScaleOutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Scale out ${AWS::StackName}-asg when average CPU > 40% for 1 minute"
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AppAutoScalingGroup
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      Threshold: 40
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleOutPolicy
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-scale-out-alarm"
        - Key: ManagedByCloudFormation
          Value: "true"

  ScaleInAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Scale in ${AWS::StackName}-asg when average CPU < 20% for 2 minutes"
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AppAutoScalingGroup
      Statistic: Average
      Period: 120
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleInPolicy
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-scale-in-alarm"
        - Key: ManagedByCloudFormation
          Value: "true"

# ============================================================================
# OUTPUTS
# ============================================================================
Outputs:

  AlbUrl:
    Description: Public URL of the Flask-Admin demo
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}/"
    Export:
      Name: !Sub "${AWS::StackName}-AlbUrl"

  AdminUrl:
    Description: Direct link to the Flask-Admin GUI
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}/admin/"
    Export:
      Name: !Sub "${AWS::StackName}-AdminUrl"

  DashboardUrl:
    Description: Direct link to the aggregate dashboard
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}/dashboard"
    Export:
      Name: !Sub "${AWS::StackName}-DashboardUrl"

  DbEndpoint:
    Description: RDS endpoint hostname (also patched into the secret)
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-DbEndpoint"

  SecretArn:
    Description: ARN of the Secrets Manager secret holding DB credentials
    Value: !Ref DBSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretArn"

  AsgName:
    Description: Auto Scaling Group name
    Value: !Ref AppAutoScalingGroup
    Export:
      Name: !Sub "${AWS::StackName}-AsgName"

  NatGatewayId:
    Description: NAT Gateway ID (remove NatEip/NatGateway/PrivateDefaultRoute to switch to locked-down variant)
    Value: !Ref NatGateway
    Export:
      Name: !Sub "${AWS::StackName}-NatGatewayId"

  NextStep:
    Description: SSM Run Command schema bootstrap -- see guide section 6
    Value: !Sub >
      aws ssm send-command --instance-ids <instance-id>
      --document-name AWS-RunShellScript
      --parameters commands=["psql -h ${DBInstance.Endpoint.Address} -U appadmin -d logistics -f schema.sql"]
    Export:
      Name: !Sub "${AWS::StackName}-NextStep"
